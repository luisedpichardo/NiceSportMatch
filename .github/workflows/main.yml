      # 1. Use the correct package manager and cache
      - name: Install dependencies
        run: npm ci # Much faster and cleaner than npm install --force

      # 2. Combine the Environment setup and remove redundant echoes
      - name: Configure Android Environment
        run: |
          mkdir -p android/app
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> android/local.properties
          echo '${{ secrets.GOOGLE_SERVICES_JSON_CONTENT }}' > android/app/google-services.json
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/NiceSportMatch-key.keystore
          # Use a smaller heap if you are hitting memory limits, but 4096 is usually fine
          echo "org.gradle.jvmargs=-Xmx3072m" >> android/gradle.properties

      # 3. Clean before build to save space
      - name: Build debug APK
        run: |
          cd android
          ./gradlew clean assembleDebug

      # 4. Use ONLY ONE Firebase upload method
      - name: Upload to Firebase
        id: testing_outputs
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{secrets.FIREBASE_APP_ID}}
          serviceCredentialsFileContent: ${{secrets.CREDENTIAL_FILE_CONTENT}}
          groups: testers
          file: android/app/build/outputs/apk/debug/app-debug.apk
